name: Databricks Medallion CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pytest
      - name: Run Unit Tests
        run: pytest tests/

  deploy-to-databricks:
    runs-on: ubuntu-latest
    needs: python-validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      # This step helps us debug by showing exactly where the files are
    # Updated Debug Step
      - name: List files for debugging
        run: |
          echo "Current directory: $(pwd)"
          ls -F
          echo "Searching for the bundle config..."
          find . -name "databricks.yml"

      - name: Bundle Deploy
        # If your file is in the root, leave as is. 
        # If it is in a subfolder, change to: databricks bundle deploy -t prod --path ./FOLDER_NAME
        run: run: databricks bundle run JOB_via_GitHUb -t prod
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}